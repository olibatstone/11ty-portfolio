<section class="newsletter-signup" aria-labelledby="newsletter-heading">
  <h2 id="newsletter-heading">Get the newsletter</h2>
  <p>Practical notes on health product design, sent when I publish.</p>
  <form
    action="https://buttondown.com/api/emails/embed-subscribe/olibatstone"
    method="post"
    target="_blank"
    class="newsletter-form"
  >
    <label for="newsletter-email" class="visually-hidden">Email address</label>
    <input
      type="email"
      id="newsletter-email"
      name="email"
      placeholder="you@company.com"
      required
    />
    <button type="submit">Subscribe</button>
  </form>
</section>
