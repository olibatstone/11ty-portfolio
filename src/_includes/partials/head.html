<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if seo_title %}{{ seo_title }}{% elsif title %}{{ title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ description | default: site.description }}">
<link rel="canonical" href="{{ site.url }}{{ page.url }}">

<meta property="og:title" content="{% if seo_title %}{{ seo_title }}{% elsif title %}{{ title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{{ description | default: site.description }}">
<meta property="og:type" content="{% if tags contains 'blog' %}article{% else %}website{% endif %}">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta property="og:image" content="{{ site.url }}{{ image | default: site.image }}">
<meta property="og:image:alt" content="{% if image %}{{ title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:site_name" content="{{ site.title }}">
{% if tags contains 'blog' and date %}
<meta property="article:published_time" content="{{ date | date: '%Y-%m-%dT%H:%M:%SZ' }}">
{% endif %}

<meta name="author" content="{{ site.title }}">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% if seo_title %}{{ seo_title }}{% elsif title %}{{ title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{{ description | default: site.description }}">
<meta name="twitter:image" content="{{ site.url }}{{ image | default: site.image }}" />
{% if site.twitter %}<meta name="twitter:site" content="{{ site.twitter }}">{% endif %}

{% if page.url == "/" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Oli Batstone",
  "jobTitle": "Independent Senior Product Designer",
  "url": "{{ site.url }}",
  "description": "{{ site.description }}",
  "email": "hi@olibatstone.com",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Bristol",
    "addressCountry": "GB"
  }
}
</script>
{% endif %}

<link rel="icon" type="image/x-icon" href="/assets/img/profile/favicon.ico">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="/feed.xml">
<link rel="sitemap" type="application/xml" href="/sitemap.xml">
<link rel="stylesheet" href="/styles/style.css">
<link rel="preload" href="/fonts/Inter.woff2" as="font" type="font/woff2" crossorigin>
