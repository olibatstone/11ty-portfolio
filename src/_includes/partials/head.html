<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if title %}{{ title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ description | default: site.description }}">

<meta property="og:title" content="{% if title %}{{ title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{{ description }}">
<meta property="og:type" content="{% if tags contains 'blog' %}article{% else %}website{% endif %}">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta property="og:image" content="{{ image }}">
<meta property="og:site_name" content="{{ site.title }}">
{% if tags contains 'blog' and date %}
<meta property="article:published_time" content="{{ date | date: '%Y-%m-%dT%H:%M:%SZ' }}">
{% endif %}

<meta name="author" content="{{ site.title }}">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% if title %}{{ title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{{ description }}">
<meta name="twitter:image" content="{{ image }}" />

<link rel="icon" type="image/x-icon" href="/assets/img/profile/favicon.ico">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="/feed.xml">
<link rel="stylesheet" href="/styles/style.css">
<link rel="preload" href="/fonts/Inter.woff2" as="font" type="font/woff2" crossorigin>
